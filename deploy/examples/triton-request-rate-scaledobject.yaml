# Example: ScaledObject for a Triton Inference Server deployment that scales
# on inference request rate (requests/sec), read directly from Triton's own
# Prometheus metrics endpoint instead of GPU utilization/memory.
#
# Prerequisites:
#   - keda-gpu-scaler DaemonSet running (kubectl apply -f deploy/manifests.yaml)
#   - KEDA v2.10+ installed
#   - A Deployment named "triton-resnet-deployment" in the "ai-workloads" namespace,
#     with a Service exposing Triton's Prometheus metrics endpoint (default :8002/metrics)
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: triton-request-rate-scaler
  namespace: ai-workloads
spec:
  scaleTargetRef:
    name: triton-resnet-deployment
  minReplicaCount: 1
  maxReplicaCount: 50
  cooldownPeriod: 30
  triggers:
    - type: external
      metadata:
        # Points to the Service created by deploy/manifests.yaml
        scalerAddress: "keda-gpu-scaler.keda.svc.cluster.local:6000"
        # Use the pre-built Triton request-rate profile (target: 50 req/s,
        # activation: 1 req/s). Override targetValue/activationThreshold
        # here to tune for your workload.
        profile: "triton-request-rate"
        # Triton's own metrics endpoint — required for triton_request_rate /
        # triton_queue_wait_ms metric types. Request rate is derived from
        # Triton's cumulative nv_inference_count counter, so it only becomes
        # meaningful after the scaler has polled this endpoint at least
        # twice (poll interval defaults to 10s via pollIntervalSeconds).
        tritonEndpoint: "http://triton-resnet-deployment:8002/metrics"
