# Infra Validate
#
# Cheap per-PR gate for infra/terraform/{aws,azure,gcp}, complementing the
# expensive real-GPU suite in e2e-cloud.yaml (workflow_dispatch-only).
#
#   - fmt/validate/tflint/checkov: credential-less, BLOCKING on every PR.
#   - docs: PR-only, single job (avoids racing pushes) that regenerates
#     terraform-docs and pushes the change back to the PR branch.
#
# Cost estimates live with the terraform-plan.yml and e2e-cloud.yaml jobs
# (Infracost in each job summary), not here.
name: Infra Validate

on:
  pull_request:
    paths: ['infra/terraform/**', '.github/workflows/infra-validate.yaml']
  push:
    branches: [main]
    paths: ['infra/terraform/**', '.github/workflows/infra-validate.yaml']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fmt:
    name: terraform fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.6

      - name: terraform fmt -check
        run: terraform fmt -check -recursive infra/terraform

  validate:
    name: terraform validate (${{ matrix.cloud }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cloud: [aws, azure, gcp, aws/bootstrap, azure/bootstrap, gcp/bootstrap]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.6

      # -backend=false: no cloud credentials needed to init providers/modules.
      - name: terraform init (no backend)
        run: terraform -chdir=infra/terraform/${{ matrix.cloud }} init -backend=false -input=false

      # validate only reads provider schemas locally, no credentials needed.
      - name: terraform validate
        run: terraform -chdir=infra/terraform/${{ matrix.cloud }} validate

  tflint:
    name: tflint (${{ matrix.cloud }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cloud: [aws, azure, gcp, aws/bootstrap, azure/bootstrap, gcp/bootstrap]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up tflint
        uses: terraform-linters/setup-tflint@6e1e0642c0289bd619021bf6b34e3c08ed1e005a # v6.3.0

      - name: tflint --init
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: tflint --chdir=infra/terraform/${{ matrix.cloud }} --init

      - name: tflint
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: tflint --chdir=infra/terraform/${{ matrix.cloud }} -f compact

  # Static, credential-less security scan; BLOCKING like fmt/validate/tflint.
  # Suppress acceptable findings via .checkov.yaml or an inline
  # `#checkov:skip=<CHECK_ID>:<reason>` comment — don't disable this gate.
  checkov:
    name: checkov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Checkov
        uses: bridgecrewio/checkov-action@7b972723c44fb3d256283fac96fae5d7c1894bb7 # v12.3114.0
        with:
          directory: infra/terraform
          framework: terraform
          config_file: .checkov.yaml
          output_format: cli
          soft_fail: false

  # Regenerates each stack's README.md doc block and pushes back to the PR
  # branch. Single job (not matrixed) to avoid three jobs racing to push.
  docs:
    name: terraform-docs
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}

      - name: terraform-docs (aws)
        uses: terraform-docs/gh-actions@6de6da0cefcc6b4b7a5cbea4d79d97060733093c # v1.4.1
        with:
          working-dir: infra/terraform/aws
          output-file: README.md
          output-method: inject
          git-push: "true"

      - name: terraform-docs (azure)
        uses: terraform-docs/gh-actions@6de6da0cefcc6b4b7a5cbea4d79d97060733093c # v1.4.1
        with:
          working-dir: infra/terraform/azure
          output-file: README.md
          output-method: inject
          git-push: "true"

      - name: terraform-docs (gcp)
        uses: terraform-docs/gh-actions@6de6da0cefcc6b4b7a5cbea4d79d97060733093c # v1.4.1
        with:
          working-dir: infra/terraform/gcp
          output-file: README.md
          output-method: inject
          git-push: "true"
