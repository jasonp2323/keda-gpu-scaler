# GPU Cluster Janitor
#
# Cost guardrail: finds and destroys LEAKED e2e GPU clusters — ones where
# `terraform apply` ran (via e2e-cloud.yaml) but the matching `terraform
# destroy` never completed, e.g. because the Go test panicked or its job got
# killed before the teardown-safety-net step ran. The e2e suite stores each
# run's remote Terraform state under a per-run key (`e2e/<cloud>/<cluster_name>`
# in AWS S3 / Azure Blob / GCP GCS), so this workflow lists state objects
# older than a TTL and runs `terraform destroy` against each one, tearing
# down everything that run created (cluster, VPC, node pool, KMS keys, etc.),
# then removes the now-empty state object/blob/prefix.
#
# Defaults:
#   - TTL_HOURS defaults to 6 (override via workflow_dispatch's `ttl_hours`
#     input). A state object is only reaped once it's older than "now - TTL".
#   - DRY_RUN defaults to true for manual (workflow_dispatch) runs, so a
#     human can preview what would be destroyed before actually deleting
#     anything. It is always forced to false on the `schedule` trigger,
#     since a scheduled event has no `inputs` to read a dry-run flag from —
#     the whole point of the schedule is unattended cleanup.
#
# Requires the SAME OIDC federation + remote-state bootstrap config as
# .github/workflows/e2e-cloud.yaml (see that file's header comment for the
# prerequisites): an AWS IAM role, Azure AD federated credential, and GCP
# Workload Identity Federation provider/service account, plus the state
# bucket/account/container repo vars used by the e2e suite's backends. Any
# cloud whose state backend var is unset is skipped (exit 0) rather than
# failing the job, so an un-bootstrapped cloud doesn't break the janitor.
#
# If a janitor job fails systemically (auth, state listing, terraform init —
# not a single cluster's destroy, which is handled inline), the notify-failure
# job opens or updates a GitHub issue labelled `janitor-failure` so leaked,
# still-billing clusters get a human's attention. Requires Issues enabled on
# the repo.
name: GPU Cluster Janitor

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:
    inputs:
      ttl_hours:
        description: 'Reap state objects older than this many hours'
        type: string
        default: '6'
      dry_run:
        description: 'Preview only — list what would be destroyed without actually destroying it'
        type: boolean
        default: true

concurrency:
  # Only one janitor run at a time across the whole repo; never cancel a
  # run that might already be mid-destroy.
  group: gpu-cluster-janitor
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  janitor-aws:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_E2E_REGION }}
      BUCKET: ${{ vars.AWS_E2E_STATE_BUCKET }}
      LOCK_TABLE: ${{ vars.AWS_E2E_STATE_LOCK_TABLE }}
      TTL_HOURS_INPUT: ${{ inputs.ttl_hours }}
      DRY_RUN_INPUT: ${{ inputs.dry_run }}
      EVENT_NAME: ${{ github.event_name }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_E2E_ROLE_ARN }}
          aws-region: ${{ vars.AWS_E2E_REGION }}

      - name: Reap leaked AWS e2e clusters
        run: |
          set -euo pipefail

          # --- resolve TTL / dry-run (see top-of-file comment for the rules) ---
          TTL_HOURS="${TTL_HOURS_INPUT:-6}"
          if [ "${EVENT_NAME}" = "schedule" ]; then
            DRY_RUN=false
          else
            DRY_RUN="${DRY_RUN_INPUT:-true}"
          fi
          CUTOFF=$(date -u -d "-${TTL_HOURS} hours" +%Y-%m-%dT%H:%M:%SZ)

          echo "=== GPU Cluster Janitor: AWS ==="
          echo "TTL hours : ${TTL_HOURS}"
          echo "Cutoff UTC: ${CUTOFF}"
          echo "Dry run   : ${DRY_RUN}"

          if [ -z "${BUCKET}" ]; then
            echo "AWS_E2E_STATE_BUCKET is not configured; skipping AWS janitor."
            exit 0
          fi

          FOUND=0
          DESTROYED=0
          SKIPPED=0

          # List every e2e state object older than the cutoff.
          KEYS=$(aws s3api list-objects-v2 --bucket "$BUCKET" --prefix "e2e/aws/" \
            --query "Contents[?LastModified<='${CUTOFF}'].Key" --output text || true)

          if [ -z "$KEYS" ] || [ "$KEYS" = "None" ]; then
            echo "No stale AWS e2e state objects found older than cutoff."
          else
            for KEY in $KEYS; do
              # Key looks like e2e/aws/<cluster_name>.tfstate
              NAME=$(basename "$KEY" .tfstate)
              FOUND=$((FOUND + 1))
              echo "Found stale state: key=${KEY} cluster=${NAME}"

              if [ "$DRY_RUN" = "true" ]; then
                echo "[dry-run] would destroy cluster '${NAME}' and remove state object '${KEY}'"
                SKIPPED=$((SKIPPED + 1))
                continue
              fi

              echo "Destroying cluster '${NAME}'..."
              terraform -chdir=infra/terraform/aws init -reconfigure -input=false \
                -backend-config="bucket=${BUCKET}" \
                -backend-config="key=${KEY}" \
                -backend-config="region=${AWS_REGION}" \
                -backend-config="dynamodb_table=${LOCK_TABLE}" \
                -backend-config="encrypt=true"

              if TF_VAR_region="${AWS_REGION}" \
                 TF_VAR_cluster_name="${NAME}" \
                 TF_VAR_gpu_instance_type=g5.xlarge \
                 TF_VAR_gpu_node_count=1 \
                 TF_VAR_scaler_image_repository=ghcr.io/pmady/keda-gpu-scaler \
                 TF_VAR_helm_timeout=600 \
                 TF_VAR_tags='{}' \
                 terraform -chdir=infra/terraform/aws destroy -auto-approve; then
                echo "Destroy succeeded for '${NAME}'; deleting state object '${KEY}'"
                aws s3api delete-object --bucket "$BUCKET" --key "$KEY"
                DESTROYED=$((DESTROYED + 1))
              else
                echo "Destroy FAILED for '${NAME}'; leaving state object '${KEY}' in place for the next run"
                SKIPPED=$((SKIPPED + 1))
              fi
            done
          fi

          echo "=== AWS janitor summary: found=${FOUND} destroyed=${DESTROYED} skipped=${SKIPPED} dry_run=${DRY_RUN} ==="

  janitor-azure:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      LOCATION: eastus
      ACCOUNT: ${{ vars.AZURE_E2E_STATE_STORAGE_ACCOUNT }}
      CONTAINER: ${{ vars.AZURE_E2E_STATE_CONTAINER }}
      STATE_RESOURCE_GROUP: ${{ vars.AZURE_E2E_STATE_RESOURCE_GROUP }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_E2E_SUBSCRIPTION_ID }}
      TTL_HOURS_INPUT: ${{ inputs.ttl_hours }}
      DRY_RUN_INPUT: ${{ inputs.dry_run }}
      EVENT_NAME: ${{ github.event_name }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.6

      - name: Azure login (OIDC)
        uses: azure/login@93381592711f247e165c389ebb30b596c84cdc48 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_E2E_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_E2E_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_E2E_SUBSCRIPTION_ID }}

      - name: Reap leaked Azure e2e clusters
        run: |
          set -euo pipefail

          # --- resolve TTL / dry-run (see top-of-file comment for the rules) ---
          TTL_HOURS="${TTL_HOURS_INPUT:-6}"
          if [ "${EVENT_NAME}" = "schedule" ]; then
            DRY_RUN=false
          else
            DRY_RUN="${DRY_RUN_INPUT:-true}"
          fi
          CUTOFF=$(date -u -d "-${TTL_HOURS} hours" +%Y-%m-%dT%H:%M:%SZ)

          echo "=== GPU Cluster Janitor: Azure ==="
          echo "TTL hours : ${TTL_HOURS}"
          echo "Cutoff UTC: ${CUTOFF}"
          echo "Dry run   : ${DRY_RUN}"

          if [ -z "${ACCOUNT}" ]; then
            echo "AZURE_E2E_STATE_STORAGE_ACCOUNT is not configured; skipping Azure janitor."
            exit 0
          fi

          FOUND=0
          DESTROYED=0
          SKIPPED=0

          # List every e2e state blob older than the cutoff.
          BLOBS=$(az storage blob list --account-name "$ACCOUNT" --container-name "$CONTAINER" \
            --prefix "e2e/azure/" --auth-mode login \
            --query "[?properties.lastModified<='${CUTOFF}'].name" -o tsv || true)

          if [ -z "$BLOBS" ]; then
            echo "No stale Azure e2e state blobs found older than cutoff."
          else
            while IFS= read -r BLOB; do
              [ -z "$BLOB" ] && continue
              # Blob name looks like e2e/azure/<cluster_name>.tfstate
              NAME=$(basename "$BLOB" .tfstate)
              FOUND=$((FOUND + 1))
              echo "Found stale state: blob=${BLOB} cluster=${NAME}"

              if [ "$DRY_RUN" = "true" ]; then
                echo "[dry-run] would destroy cluster '${NAME}' and remove blob '${BLOB}'"
                SKIPPED=$((SKIPPED + 1))
                continue
              fi

              echo "Destroying cluster '${NAME}'..."
              terraform -chdir=infra/terraform/azure init -reconfigure -input=false \
                -backend-config="resource_group_name=${STATE_RESOURCE_GROUP}" \
                -backend-config="storage_account_name=${ACCOUNT}" \
                -backend-config="container_name=${CONTAINER:-tfstate}" \
                -backend-config="key=${BLOB}"

              if TF_VAR_cluster_name="${NAME}" \
                 TF_VAR_location="${LOCATION}" \
                 TF_VAR_resource_group_name="${NAME}-rg" \
                 terraform -chdir=infra/terraform/azure destroy -auto-approve; then
                echo "Destroy succeeded for '${NAME}'; deleting blob '${BLOB}'"
                az storage blob delete --account-name "$ACCOUNT" --container-name "$CONTAINER" \
                  --name "$BLOB" --auth-mode login
                DESTROYED=$((DESTROYED + 1))
              else
                echo "Destroy FAILED for '${NAME}'; leaving blob '${BLOB}' in place for the next run"
                SKIPPED=$((SKIPPED + 1))
              fi
            done <<< "$BLOBS"
          fi

          echo "=== Azure janitor summary: found=${FOUND} destroyed=${DESTROYED} skipped=${SKIPPED} dry_run=${DRY_RUN} ==="

  janitor-gcp:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      PROJECT: ${{ vars.GCP_E2E_PROJECT }}
      BUCKET: ${{ vars.GCP_E2E_STATE_BUCKET }}
      TTL_HOURS_INPUT: ${{ inputs.ttl_hours }}
      DRY_RUN_INPUT: ${{ inputs.dry_run }}
      EVENT_NAME: ${{ github.event_name }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.6

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_E2E_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_E2E_SERVICE_ACCOUNT }}

      - name: Reap leaked GCP e2e clusters
        run: |
          set -euo pipefail

          # --- resolve TTL / dry-run (see top-of-file comment for the rules) ---
          TTL_HOURS="${TTL_HOURS_INPUT:-6}"
          if [ "${EVENT_NAME}" = "schedule" ]; then
            DRY_RUN=false
          else
            DRY_RUN="${DRY_RUN_INPUT:-true}"
          fi
          CUTOFF=$(date -u -d "-${TTL_HOURS} hours" +%Y-%m-%dT%H:%M:%SZ)

          echo "=== GPU Cluster Janitor: GCP ==="
          echo "TTL hours : ${TTL_HOURS}"
          echo "Cutoff UTC: ${CUTOFF}"
          echo "Dry run   : ${DRY_RUN}"

          if [ -z "${BUCKET}" ]; then
            echo "GCP_E2E_STATE_BUCKET is not configured; skipping GCP janitor."
            exit 0
          fi

          FOUND=0
          DESTROYED=0
          SKIPPED=0

          # List every object under the e2e/gcp/ prefix; we filter down to
          # "*/default.tfstate" objects older than cutoff ourselves below,
          # since gcloud's --format query language can't easily do a
          # suffix-match + date-compare in one expression.
          OBJECTS=$(gcloud storage objects list "gs://${BUCKET}/e2e/gcp/**" \
            --format="value(name,updated)" || true)

          if [ -z "$OBJECTS" ]; then
            echo "No objects found under gs://${BUCKET}/e2e/gcp/."
          else
            while IFS=$'\t' read -r OBJ_NAME OBJ_UPDATED; do
              [ -z "$OBJ_NAME" ] && continue
              case "$OBJ_NAME" in
                */default.tfstate) ;;
                *) continue ;;
              esac

              # Only reap state objects older than the cutoff (ISO8601 strings
              # compare correctly lexicographically in this format).
              if [[ ! "$OBJ_UPDATED" < "$CUTOFF" ]]; then
                continue
              fi

              # OBJ_NAME looks like gs://<bucket>/e2e/gcp/<cluster_name>/default.tfstate
              REL="${OBJ_NAME#gs://${BUCKET}/e2e/gcp/}"
              NAME="${REL%/default.tfstate}"
              FOUND=$((FOUND + 1))
              echo "Found stale state: object=${OBJ_NAME} updated=${OBJ_UPDATED} cluster=${NAME}"

              if [ "$DRY_RUN" = "true" ]; then
                echo "[dry-run] would destroy cluster '${NAME}' and remove prefix 'e2e/gcp/${NAME}/'"
                SKIPPED=$((SKIPPED + 1))
                continue
              fi

              echo "Destroying cluster '${NAME}'..."
              terraform -chdir=infra/terraform/gcp init -reconfigure -input=false \
                -backend-config="bucket=${BUCKET}" \
                -backend-config="prefix=e2e/gcp/${NAME}"

              if TF_VAR_project_id="${PROJECT}" \
                 TF_VAR_region=us-central1 \
                 TF_VAR_zone=us-central1-a \
                 TF_VAR_cluster_name="${NAME}" \
                 TF_VAR_gpu_machine_type=n1-standard-4 \
                 TF_VAR_gpu_type=nvidia-tesla-t4 \
                 TF_VAR_gpu_per_node=1 \
                 TF_VAR_gpu_node_count=1 \
                 TF_VAR_helm_timeout=1800 \
                 TF_VAR_scaler_image_repository=ghcr.io/pmady/keda-gpu-scaler \
                 TF_VAR_labels='{}' \
                 terraform -chdir=infra/terraform/gcp destroy -auto-approve; then
                echo "Destroy succeeded for '${NAME}'; deleting state prefix 'e2e/gcp/${NAME}/'"
                gcloud storage rm --recursive "gs://${BUCKET}/e2e/gcp/${NAME}/"
                DESTROYED=$((DESTROYED + 1))
              else
                echo "Destroy FAILED for '${NAME}'; leaving state prefix 'e2e/gcp/${NAME}/' in place for the next run"
                SKIPPED=$((SKIPPED + 1))
              fi
            done <<< "$OBJECTS"
          fi

          echo "=== GCP janitor summary: found=${FOUND} destroyed=${DESTROYED} skipped=${SKIPPED} dry_run=${DRY_RUN} ==="

  # Runs only when a janitor job FAILED systemically (auth, state listing,
  # terraform init — a single cluster's destroy failure is handled inline and
  # does not fail its job). Opens a GitHub issue (or comments on the open one)
  # so leaked GPU clusters that weren't reaped don't keep billing unnoticed.
  # Requires Issues to be enabled on the repository.
  notify-failure:
    needs: [janitor-aws, janitor-azure, janitor-gcp]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      # Presence of SMTP_SERVER gates the optional email step below.
      SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
    steps:
      - name: Open or update the janitor-failure issue
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const label = 'janitor-failure';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              'The **GPU Cluster Janitor** workflow failed — leaked GPU clusters may still be billing.',
              '',
              `Failed run: ${runUrl}`,
              '',
              'Next steps: check which cloud job failed, then reap manually (run the workflow via workflow_dispatch with `dry_run: false`) or fix the OIDC / state-backend config.',
            ].join('\n');
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
              per_page: 1,
            });
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'GPU cluster janitor failed',
                body,
                labels: [label],
              });
            }

      - name: Send failure email (optional)
        # Skipped unless SMTP secrets are configured — the GitHub issue above is
        # the always-on channel. To enable email, set the SMTP_SERVER, SMTP_PORT,
        # SMTP_USERNAME, SMTP_PASSWORD secrets and the JANITOR_ALERT_EMAIL variable.
        if: env.SMTP_SERVER != ''
        uses: dawidd6/action-send-mail@2cea9617b09d79a095af21254fbcb7ae95903dde # v3.12.0
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          from: keda-gpu-scaler janitor <${{ secrets.SMTP_USERNAME }}>
          to: ${{ vars.JANITOR_ALERT_EMAIL }}
          subject: "[keda-gpu-scaler] GPU cluster janitor FAILED"
          body: |
            The GPU Cluster Janitor workflow failed — leaked GPU clusters may still be billing.

            Failed run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
