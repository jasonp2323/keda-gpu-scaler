          { echo "### Plan digest — azure (tf-summarize)"; echo '```'; (cd infra/terraform/azure && "$GITHUB_WORKSPACE/tf-summarize" plan.out); echo '```'; } >> "$GITHUB_STEP_SUMMARY"

