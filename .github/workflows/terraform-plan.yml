name: Terraform Plan
on:
  workflow_dispatch:
    inputs:
      cloud:
        description: 'Cloud stack to plan'
        type: choice
        options: [aws, azure, gcp]
        required: true
concurrency:
  group: terraform-plan-${{ inputs.cloud }}
  cancel-in-progress: false
permissions:
  contents: read

jobs:
  # Manual single-cloud plan; runs in the e2e-<cloud> environment so the
  # OIDC subject matches the bootstrap trust policy (environment-based, not
  # ref-based). The plan step itself exits 0 so diagnostic/upload steps
  # below still run via `if: always()`.
  plan-aws:
    if: inputs.cloud == 'aws'
    name: terraform plan (aws)
    runs-on: ubuntu-latest
    environment: e2e-aws
    permissions:
      contents: read
      id-token: write
    env:
      # Placeholders for required (no-default) vars so init/plan never
      # blocks on interactive input; follows terraform.tfvars.example.
      TF_VAR_region: us-east-2
      TF_VAR_cluster_name: keda-gpu-scaler-ci-plan
      TF_VAR_kubernetes_version: '1.33'
      TF_VAR_tags: '{}'
      TF_VAR_gpu_instance_type: g5.xlarge
      TF_VAR_gpu_node_count: 1
      TF_VAR_scaler_image_repository: ghcr.io/pmady/keda-gpu-scaler
      TF_VAR_helm_timeout: 600
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_E2E_ROLE_ARN }}
          aws-region: ${{ vars.AWS_E2E_REGION }}

      - name: terraform init
        env:
          TF_LOG: DEBUG
          TF_LOG_PATH: ${{ github.workspace }}/tf-diag-aws-init.log
        # Plan-specific state key so advisory plans never touch e2e run state.
        run: |
          terraform -chdir=infra/terraform/aws init -input=false \
            -backend-config="bucket=${{ vars.AWS_E2E_STATE_BUCKET }}" \
            -backend-config="key=plan/aws/${{ github.run_id }}.tfstate" \
            -backend-config="region=${{ vars.AWS_E2E_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.AWS_E2E_STATE_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: terraform plan
        id: plan
        env:
          TF_LOG: DEBUG
          TF_LOG_PATH: ${{ github.workspace }}/tf-diag-aws-plan.log
        run: |
          set +e
          terraform -chdir=infra/terraform/aws plan -input=false -lock=false -no-color -out=plan.out 2>&1 | tee infra/terraform/aws/plan.txt
          code=${PIPESTATUS[0]}
          echo "plan exit: ${code}"
          exit 0   # advisory job — never fail here

      - name: Set up Infracost (aws)
        if: always()
        continue-on-error: true
        uses: infracost/actions/setup@fb736a8f219195d6efdca58682069b16fe1bc280 # v4.2.0
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      # Credential-less HCL cost estimate into the job summary (hourly + monthly).
      - name: Cost estimate (aws)
        if: always()
        continue-on-error: true
        run: |
          set -uo pipefail
          {
            echo 'region                  = "us-east-2"'
            echo 'cluster_name            = "keda-gpu-scaler-ci-cost"'
            echo 'gpu_instance_type       = "g5.xlarge"'
            echo 'gpu_node_count          = 1'
            echo 'scaler_image_repository = "ghcr.io/pmady/keda-gpu-scaler"'
            echo 'helm_timeout            = 600'
            echo 'tags                    = {}'
          } > /tmp/cost-aws.tfvars
          if ! infracost breakdown --path=infra/terraform/aws --terraform-var-file=/tmp/cost-aws.tfvars \
                 --format=json --out-file=/tmp/infracost-aws.json; then
            echo "infracost breakdown failed (INFRACOST_API_KEY not set?)"; exit 0
          fi
          {
            echo "## Cost — aws (Infracost)"
            echo
            monthly=$(jq -r '.totalMonthlyCost // empty' /tmp/infracost-aws.json)
            if [ -n "$monthly" ]; then
              hourly=$(awk "BEGIN { printf \"%.4f\", ${monthly}/730 }")
              echo "Hourly: **\$${hourly}** | Monthly: **\$${monthly}**"
              echo
              echo '<details><summary>Full cost table</summary>'
              echo
              echo '```'
              infracost output --path=/tmp/infracost-aws.json --format=table || echo "infracost output failed"
              echo '```'
              echo
              echo '</details>'
            else
              echo "cost unavailable (no totalMonthlyCost in breakdown output)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload plan artifact (aws)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: tfplan-aws-${{ github.sha }}
          path: infra/terraform/aws/plan.out
          retention-days: 5
          if-no-files-found: ignore

      - name: Plan digest (aws, tf-summarize)
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          [ -f infra/terraform/aws/plan.out ] || { echo "no plan.out; skipping"; exit 0; }
          ver=$(curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" https://api.github.com/repos/dineshba/terraform-plan-summary/releases/latest | jq -r .tag_name)
          [ -n "$ver" ] && [ "$ver" != "null" ] || { echo "no release; skipping"; exit 0; }
          curl -fsSL "https://github.com/dineshba/terraform-plan-summary/releases/download/${ver}/tf-summarize_linux_amd64.tar.gz" | tar -xz tf-summarize
          { echo "### Plan digest — aws (tf-summarize)"; echo '```'; (cd infra/terraform/aws && "$GITHUB_WORKSPACE/tf-summarize" plan.out); echo '```'; } >> "$GITHUB_STEP_SUMMARY"

      - name: Plan change table (aws)
        if: always()
        run: |
          if [ -f infra/terraform/aws/plan.out ]; then
            {
              echo "| Change | Resource |"
              echo "| --- | --- |"
              terraform -chdir=infra/terraform/aws show -json plan.out \
                | jq -r '
                    .resource_changes[]
                    | select((.change.actions | index("no-op") | not) and (.change.actions | index("read") | not))
                    | ( .change.actions | join(",") ) as $a
                    | ( if $a == "create" then "create"
                        elif $a == "update" then "update"
                        elif $a == "delete" then "destroy"
                        elif $a == "delete,create" or $a == "create,delete" then "replace"
                        else $a end ) as $label
                    | "| \($label) | `\(.address)` |"
                  '
            } > infra/terraform/aws/plan-table.md
          else
            echo "no plan.out; skipping plan table"
          fi

      - name: Upload diagnostic logs (aws)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: terraform-diag-aws-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            tf-diag-aws-*.log
            infra/terraform/aws/plan.txt
          retention-days: 30
          if-no-files-found: ignore

      - name: Job summary (aws)
        if: always()
        run: |
          {
            echo "## Terraform plan — aws"
            echo
            if [ -f infra/terraform/aws/plan-table.md ]; then
              cat infra/terraform/aws/plan-table.md
              echo
            fi
            if [ -f infra/terraform/aws/plan.txt ]; then
              line=$(grep -E '^(Plan:|No changes)' infra/terraform/aws/plan.txt | head -1)
              if [ -n "$line" ]; then
                echo "**${line}**"
                echo
                echo "<details><summary>Full plan output</summary>"
                echo
                echo '```hcl'
                head -c 900000 infra/terraform/aws/plan.txt
                echo '```'
                echo
                echo "</details>"
              else
                echo "### Error"
                echo
                echo '```'
                grep -E '^(Error:|│)' infra/terraform/aws/plan.txt || echo "no error detail found"
                echo '```'
              fi
            else
              echo "_no plan output (plan.txt missing)_"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  plan-azure:
    if: inputs.cloud == 'azure'
    name: terraform plan (azure)
    runs-on: ubuntu-latest
    environment: e2e-azure
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.6

      - name: Azure login (OIDC)
        uses: azure/login@93381592711f247e165c389ebb30b596c84cdc48 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_E2E_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_E2E_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_E2E_SUBSCRIPTION_ID }}

      # No TF_VAR_* needed — all azure vars have defaults; subscription_id
      # resolves from ARM_SUBSCRIPTION_ID instead.
      - name: terraform init
        env:
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_E2E_SUBSCRIPTION_ID }}
          TF_LOG: DEBUG
          TF_LOG_PATH: ${{ github.workspace }}/tf-diag-azure-init.log
        # Plan-specific state key so advisory plans never touch e2e run state.
        run: |
          terraform -chdir=infra/terraform/azure init -input=false \
            -backend-config="resource_group_name=${{ vars.AZURE_E2E_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.AZURE_E2E_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.AZURE_E2E_STATE_CONTAINER || 'tfstate' }}" \
            -backend-config="key=plan/azure/${{ github.run_id }}.tfstate"

      - name: terraform plan
        id: plan
        env:
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_E2E_SUBSCRIPTION_ID }}
          TF_LOG: DEBUG
          TF_LOG_PATH: ${{ github.workspace }}/tf-diag-azure-plan.log
