# Infra Validate
#
# Cheap, per-PR "Tier 1-2" gate for the Terraform stacks under
# infra/terraform/{aws,azure,gcp}. This is the free, fast complement to the
# expensive apply-level suite in e2e-cloud.yaml (which provisions real billed
# GPU hardware and is workflow_dispatch-only).
#
# Two tiers of checks:
#   - fmt / validate / tflint / checkov: credential-less, run against every
#     PR, BLOCKING. They only read provider schemas, lint rules, and static
#     IaC scan rules — no cloud account is ever contacted, so they can't leak
#     secrets or cost money.
#   - plan: OIDC-authed against the real cloud (read-only), ADVISORY only
#     (continue-on-error: true at the job level). It is not a merge blocker
#     because these stacks configure their kubernetes/helm providers from the
#     cluster endpoint that only exists AFTER `apply` — a fresh, stateless
#     `terraform plan` against an empty state can legitimately fail or defer
#     those resources. Reviewers should still read plan output when it
#     succeeds; a failure here just means "inconclusive," not "broken." Each
#     plan job also uploads a plan artifact/diagnostics, posts a digest and
#     change table to the job summary, and updates a single PR comment (per
#     cloud) in place across pushes.
#   - cost: PR-only, credential-less (Infracost parses HCL statically) advisory
#     matrix over the three clouds. Posts/refreshes one cost comment per cloud
#     and a job-summary breakdown.
#   - docs: PR-only, single job (not matrixed, to avoid racing pushes) that
#     regenerates each stack's terraform-docs block in place and pushes the
#     change back to the PR branch if anything changed.
name: Infra Validate

on:
  pull_request:
    paths: ['infra/terraform/**', '.github/workflows/infra-validate.yaml']
  push:
    branches: [main]
    paths: ['infra/terraform/**', '.github/workflows/infra-validate.yaml']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fmt:
    name: terraform fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.6

      - name: terraform fmt -check
        run: terraform fmt -check -recursive infra/terraform

  validate:
    name: terraform validate (${{ matrix.cloud }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cloud: [aws, azure, gcp, aws/bootstrap, azure/bootstrap, gcp/bootstrap]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.6

      # -backend=false: no cloud credentials needed to init providers/modules.
      - name: terraform init (no backend)
        run: terraform -chdir=infra/terraform/${{ matrix.cloud }} init -backend=false -input=false

      # validate only reads provider schemas locally, no credentials needed.
      - name: terraform validate
        run: terraform -chdir=infra/terraform/${{ matrix.cloud }} validate

  tflint:
    name: tflint (${{ matrix.cloud }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cloud: [aws, azure, gcp, aws/bootstrap, azure/bootstrap, gcp/bootstrap]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up tflint
        uses: terraform-linters/setup-tflint@6e1e0642c0289bd619021bf6b34e3c08ed1e005a # v6.3.0

      - name: tflint --init
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: tflint --chdir=infra/terraform/${{ matrix.cloud }} --init

      - name: tflint
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: tflint --chdir=infra/terraform/${{ matrix.cloud }} -f compact

  # Checkov: static Terraform security/misconfiguration scan. Credential-less
  # (reads the Terraform source only, no cloud account contacted) and
  # BLOCKING, same tier as fmt/validate/tflint above. If a finding is
  # acceptable for these throwaway test clusters (e.g. a public API
  # endpoint, no encryption at rest), suppress it via a repo-root
  # .checkov.yaml (skip-check) or an inline
  # `#checkov:skip=<CHECK_ID>:<reason>` comment — don't disable this gate.
  checkov:
    name: checkov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Checkov
        uses: bridgecrewio/checkov-action@7b972723c44fb3d256283fac96fae5d7c1894bb7 # v12.3114.0
        with:
          directory: infra/terraform
          framework: terraform
          output_format: cli
          soft_fail: false

  # Infracost: static, credential-less monthly-cost estimate parsed from the
  # Terraform HCL (no cloud account contacted, no plan required). PR-only,
  # matrixed over the three clouds, entirely advisory — INFRACOST_API_KEY
  # missing or a breakdown failure just yields a "cost unavailable" comment,
  # never a failed job.
  cost:
    name: infracost (${{ matrix.cloud }})
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        cloud: [aws, azure, gcp]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Infracost
        uses: infracost/actions/setup@fb736a8f219195d6efdca58682069b16fe1bc280 # v4.2.0
        continue-on-error: true
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      # Materialize a per-cloud tfvars file so the stack's required
      # (no-default) variables resolve — Infracost only parses HCL, it never
      # talks to a cloud account, so these are just placeholders matching the
      # plan-*/e2e-cloud.yaml conventions. Azure has no required variables
      # (every infra/terraform/azure/variables.tf entry has a default), so it
      # gets no var-file.
      - name: Write cost tfvars (${{ matrix.cloud }})
        run: |
          case "${{ matrix.cloud }}" in
            aws)
              {
                echo 'region                  = "us-east-2"'
                echo 'cluster_name            = "keda-gpu-scaler-ci-cost"'
                echo 'gpu_instance_type       = "g5.xlarge"'
                echo 'gpu_node_count          = 1'
                echo 'scaler_image_repository = "ghcr.io/pmady/keda-gpu-scaler"'
                echo 'helm_timeout            = 600'
                echo 'tags                    = {}'
              } > /tmp/cost-aws.tfvars
              ;;
            gcp)
              {
                echo "project_id              = \"${{ vars.GCP_E2E_PROJECT }}\""
                echo 'region                  = "us-central1"'
                echo 'zone                    = "us-central1-a"'
                echo 'cluster_name            = "keda-gpu-scaler-ci-cost"'
                echo 'gpu_machine_type        = "n1-standard-4"'
                echo 'gpu_type                = "nvidia-tesla-t4"'
                echo 'gpu_per_node            = 1'
                echo 'gpu_node_count          = 1'
                echo 'scaler_image_repository = "ghcr.io/pmady/keda-gpu-scaler"'
                echo 'helm_timeout            = 1800'
                echo 'labels                  = {}'
              } > /tmp/cost-gcp.tfvars
              ;;
            azure)
              echo "azure: no required vars, skipping tfvars file"
              ;;
          esac

      - name: Generate cost breakdown (${{ matrix.cloud }})
        continue-on-error: true
        run: |
          case "${{ matrix.cloud }}" in
            azure)
              infracost breakdown --path=infra/terraform/azure --format=json --out-file=/tmp/infracost-azure.json
              ;;
            *)
              infracost breakdown --path=infra/terraform/${{ matrix.cloud }} --terraform-var-file=/tmp/cost-${{ matrix.cloud }}.tfvars --format=json --out-file=/tmp/infracost-${{ matrix.cloud }}.json
              ;;
          esac

      - name: Comment cost on PR (${{ matrix.cloud }})
        if: always()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');
            const cloud = '${{ matrix.cloud }}';
            const marker = `<!-- infracost-${cloud} -->`;
            const jsonPath = `/tmp/infracost-${cloud}.json`;

            let body;
            if (!fs.existsSync(jsonPath)) {
              body = `${marker}\n### Cost — ${cloud} (Infracost)\n\ncost unavailable (INFRACOST_API_KEY not set or breakdown failed)`;
            } else {
              let table;
              try {
                table = execSync(`infracost output --path=${jsonPath} --format=table`, { maxBuffer: 10 * 1024 * 1024 }).toString();
              } catch (e) {
                table = `infracost output failed: ${e.message}`;
              }

              let monthly = null;
              try {
                const data = JSON.parse(fs.readFileSync(jsonPath, 'utf8'));
                if (data.totalMonthlyCost !== undefined && data.totalMonthlyCost !== null) {
                  monthly = Number(data.totalMonthlyCost);
                }
              } catch (e) {
                // leave monthly as null
              }
              const hourly = monthly !== null ? monthly / 730 : null;
              const fmt = (n) => (n === null || Number.isNaN(n)) ? 'N/A' : `$${n.toFixed(2)}`;

              body = [
                marker,
                `### Cost — ${cloud} (Infracost)`,
                '',
                `Monthly: **${fmt(monthly)}** | Hourly: **${fmt(hourly)}**`,
                '',
                '<details><summary>Full cost table</summary>',
                '',
                '```',
                table,
                '```',
                '',
                '</details>',
              ].join('\n');
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Cost summary (${{ matrix.cloud }})
        if: always()
        run: |
          {
            echo "## Cost — ${{ matrix.cloud }}"
            echo
            if [ -f /tmp/infracost-${{ matrix.cloud }}.json ]; then
              monthly=$(jq -r '.totalMonthlyCost // empty' /tmp/infracost-${{ matrix.cloud }}.json)
              if [ -n "$monthly" ]; then
                hourly=$(awk "BEGIN { printf \"%.4f\", ${monthly}/730 }")
                echo "Monthly: **\$${monthly}** | Hourly: **\$${hourly}**"
              else
                echo "cost unavailable (no totalMonthlyCost in breakdown output)"
              fi
              echo
              echo '<details><summary>Full cost table</summary>'
              echo
              echo '```'
              infracost output --path=/tmp/infracost-${{ matrix.cloud }}.json --format=table || echo "infracost output failed"
              echo '```'
              echo
              echo '</details>'
            else
              echo "cost unavailable (INFRACOST_API_KEY not set or breakdown failed)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # terraform-docs: regenerates the injected block in each stack's README.md
  # in place and pushes the change back onto the PR branch. Single job (NOT
  # matrixed) so at most one push happens per run — a matrix here would have
  # three jobs racing to push to the same branch.
  docs:
    name: terraform-docs
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}

      - name: terraform-docs (aws)
        uses: terraform-docs/gh-actions@6de6da0cefcc6b4b7a5cbea4d79d97060733093c # v1.4.1
        with:
          working-dir: infra/terraform/aws
          output-file: README.md
          output-method: inject
          git-push: "false"

      - name: terraform-docs (azure)
        uses: terraform-docs/gh-actions@6de6da0cefcc6b4b7a5cbea4d79d97060733093c # v1.4.1
        with:
          working-dir: infra/terraform/azure
          output-file: README.md
          output-method: inject
          git-push: "false"

      - name: terraform-docs (gcp)
        uses: terraform-docs/gh-actions@6de6da0cefcc6b4b7a5cbea4d79d97060733093c # v1.4.1
        with:
          working-dir: infra/terraform/gcp
          output-file: README.md
          output-method: inject
          git-push: "false"

      - name: Commit and push docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/terraform/*/README.md
          if ! git diff --cached --quiet; then
            git commit -m "docs: update terraform-docs"
            git push
          else
            echo "no doc changes"
          fi
