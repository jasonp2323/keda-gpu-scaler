# E2E Cloud Tests
#
# Provisions REAL cloud GPU infrastructure (AWS EKS / Azure AKS / GCP GKE) via
# the Terratest suite at tests/terratest/, asserts KEDA/keda-gpu-scaler scaling
# against actual NVIDIA hardware, then tears it down. This COSTS REAL MONEY —
# ballpark ~$0.55-1/hr per cloud per run (see infra/terraform/README.md's cost
# warning banner for current per-cloud figures). Bring the infra up, run the
# tests, destroy everything — this workflow's job steps do both automatically,
# but read the cost warning before running it.
#
# Prerequisites, per cloud, before this workflow can succeed:
#   - GPU service quota already granted (fresh accounts default to 0 GPU
#     quota) — see the quota section at the top of infra/terraform/README.md.
#   - OIDC federation configured so GitHub Actions can assume a cloud identity
#     with no long-lived secret: an AWS IAM role trusting the GitHub OIDC
#     provider (secrets.AWS_E2E_ROLE_ARN), an Azure AD app federated credential
#     (secrets.AZURE_E2E_CLIENT_ID/TENANT_ID/SUBSCRIPTION_ID), and a GCP
#     Workload Identity Federation provider + service account
#     (secrets.GCP_E2E_WIF_PROVIDER/GCP_E2E_SERVICE_ACCOUNT).
#
# This is intentionally manual-only (workflow_dispatch), not wired to every
# PR/push — each run bills real GPU hardware, matching infra/terraform/README.md's
# "CI is manual only" convention for `terraform apply` itself.
name: E2E Cloud Tests

on:
  workflow_dispatch:
    inputs:
      clouds:
        description: 'Which cloud suite(s) to run'
        type: choice
        options:
          - aws
          - azure
          - gcp
          - all
        default: aws
        required: true
      confirm_cost:
        description: "Type 'apply' to confirm you understand this provisions billed GPU hardware"
        type: string
        required: true
  # Uncomment below to also run nightly. Caveat: a scheduled event has no
  # `inputs.confirm_cost` to check, so the cost-confirmation gate below would
  # need to be bypassed or reworked for schedule-triggered runs (e.g. gate on
  # `github.event_name == 'schedule'` in addition to the confirm_cost check) —
  # not solved here, left as a caveat for whoever enables this.
  # schedule:
  #   - cron: '0 6 * * *'

concurrency:
  # Keyed on workflow + cloud input so overlapping expensive runs queue
  # instead of racing each other against the same cloud account.
  group: ${{ github.workflow }}-${{ inputs.clouds }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  e2e-aws:
    if: inputs.confirm_cost == 'apply' && (inputs.clouds == 'aws' || inputs.clouds == 'all')
    timeout-minutes: 90
    runs-on: ubuntu-latest
    # Requires a GitHub Environment named "e2e-aws" — a repo admin should add
    # required reviewers to it so cloud spend needs human approval per run.
    environment: e2e-aws
    permissions:
      contents: read
      id-token: write
    env:
      # Defined once here; both the go-test step and the teardown-safety step
      # below read these same values, so teardown targets the exact cluster
      # the test created.
      AWS_REGION: ${{ vars.AWS_E2E_REGION }}
      E2E_CLUSTER_NAME: keda-gpu-e2e-${{ github.run_id }}
      E2E_K8S_VERSION: '1.33'
      E2E_GPU_INSTANCE_TYPE: g5.xlarge
      E2E_GPU_NODE_COUNT: '1'
      E2E_SCALER_IMAGE_REPOSITORY: ghcr.io/pmady/keda-gpu-scaler
      E2E_SCALER_IMAGE_TAG: v0.5.0
      E2E_HELM_TIMEOUT: '900'
      # Remote state backend created by infra/terraform/aws/bootstrap.
      E2E_AWS_STATE_BUCKET: ${{ vars.AWS_E2E_STATE_BUCKET }}
      E2E_AWS_STATE_LOCK_TABLE: ${{ vars.AWS_E2E_STATE_LOCK_TABLE }}
      # Where the Go test writes failure diagnostics; uploaded as an artifact below.
      E2E_ARTIFACTS_DIR: ${{ github.workspace }}/e2e-artifacts
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.25'

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_E2E_ROLE_ARN }}
          aws-region: ${{ vars.AWS_E2E_REGION }}

      - name: Run AWS terratest e2e suite
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          mkdir -p "$E2E_ARTIFACTS_DIR"
          set -o pipefail
          go test -tags e2e_aws -timeout 60m -v ./tests/terratest/ 2>&1 | tee "$E2E_ARTIFACTS_DIR/gotest-aws.log"

      - name: Upload e2e diagnostics (AWS)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: e2e-diagnostics-aws-${{ github.run_id }}
          path: e2e-artifacts/
          if-no-files-found: ignore
          retention-days: 14

      # Best-effort teardown safety net: the test's own `defer` is the PRIMARY
      # teardown path. This step only guards against the Go test panicking or
      # being killed before that defer runs. It needs the exact same variable
      # values as the apply (from the job-level env above) or it can't
      # correctly target/destroy the right resources.
      - name: Terraform destroy safety net (AWS)
        if: always()
        continue-on-error: true
        env:
          TF_VAR_region: ${{ env.AWS_REGION }}
          TF_VAR_cluster_name: ${{ env.E2E_CLUSTER_NAME }}
          TF_VAR_kubernetes_version: ${{ env.E2E_K8S_VERSION }}
          TF_VAR_tags: '{}'
          TF_VAR_gpu_instance_type: ${{ env.E2E_GPU_INSTANCE_TYPE }}
          TF_VAR_gpu_node_count: ${{ env.E2E_GPU_NODE_COUNT }}
          TF_VAR_scaler_image_repository: ${{ env.E2E_SCALER_IMAGE_REPOSITORY }}
          TF_VAR_helm_timeout: ${{ env.E2E_HELM_TIMEOUT }}
        # Re-init the remote backend to the same state key the test used, then destroy.
        run: |
          terraform -chdir=infra/terraform/aws init -reconfigure -input=false \
            -backend-config="bucket=${E2E_AWS_STATE_BUCKET}" \
            -backend-config="key=e2e/aws/${E2E_CLUSTER_NAME}.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${E2E_AWS_STATE_LOCK_TABLE}" \
            -backend-config="encrypt=true"
          terraform -chdir=infra/terraform/aws destroy -auto-approve

  e2e-azure:
    if: inputs.confirm_cost == 'apply' && (inputs.clouds == 'azure' || inputs.clouds == 'all')
    timeout-minutes: 90
    runs-on: ubuntu-latest
    # Requires a GitHub Environment named "e2e-azure" — a repo admin should add
    # required reviewers to it so cloud spend needs human approval per run.
    environment: e2e-azure
    permissions:
      contents: read
      id-token: write
    env:
      # Defined once here; both the go-test step and the teardown-safety step
      # below read these same values, so teardown targets the exact cluster
      # the test created.
      E2E_AZURE_LOCATION: eastus
      E2E_AZURE_RESOURCE_GROUP: keda-gpu-e2e-${{ github.run_id }}-rg
      E2E_CLUSTER_NAME: keda-gpu-e2e-${{ github.run_id }}
      E2E_K8S_VERSION: '1.33'
      E2E_SCALER_IMAGE_TAG: v0.5.0
      E2E_HELM_TIMEOUT: '900'
      # Remote state backend created by infra/terraform/azure/bootstrap.
      E2E_AZURE_STATE_RESOURCE_GROUP: ${{ vars.AZURE_E2E_STATE_RESOURCE_GROUP }}
      E2E_AZURE_STATE_STORAGE_ACCOUNT: ${{ vars.AZURE_E2E_STATE_STORAGE_ACCOUNT }}
      E2E_AZURE_STATE_CONTAINER: ${{ vars.AZURE_E2E_STATE_CONTAINER }}
      # Where the Go test writes failure diagnostics; uploaded as an artifact below.
      E2E_ARTIFACTS_DIR: ${{ github.workspace }}/e2e-artifacts
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.25'

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.6

      - name: Azure login (OIDC)
        uses: azure/login@93381592711f247e165c389ebb30b596c84cdc48 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_E2E_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_E2E_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_E2E_SUBSCRIPTION_ID }}

      - name: Run Azure terratest e2e suite
        env:
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_E2E_SUBSCRIPTION_ID }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          mkdir -p "$E2E_ARTIFACTS_DIR"
          set -o pipefail
          go test -tags e2e_azure -timeout 60m -v ./tests/terratest/ 2>&1 | tee "$E2E_ARTIFACTS_DIR/gotest-azure.log"

      - name: Upload e2e diagnostics (Azure)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: e2e-diagnostics-azure-${{ github.run_id }}
          path: e2e-artifacts/
          if-no-files-found: ignore
          retention-days: 14

      # Best-effort teardown safety net: the test's own `defer` is the PRIMARY
      # teardown path. This step only guards against the Go test panicking or
      # being killed before that defer runs. It needs the exact same variable
      # values as the apply (from the job-level env above) or it can't
      # correctly target/destroy the right resources.
      - name: Terraform destroy safety net (Azure)
        if: always()
        continue-on-error: true
        env:
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_E2E_SUBSCRIPTION_ID }}
          TF_VAR_cluster_name: ${{ env.E2E_CLUSTER_NAME }}
          TF_VAR_location: ${{ env.E2E_AZURE_LOCATION }}
          TF_VAR_resource_group_name: ${{ env.E2E_AZURE_RESOURCE_GROUP }}
        # Re-init the remote backend to the same state key the test used, then destroy.
        run: |
          terraform -chdir=infra/terraform/azure init -reconfigure -input=false \
            -backend-config="resource_group_name=${E2E_AZURE_STATE_RESOURCE_GROUP}" \
            -backend-config="storage_account_name=${E2E_AZURE_STATE_STORAGE_ACCOUNT}" \
            -backend-config="container_name=${E2E_AZURE_STATE_CONTAINER:-tfstate}" \
            -backend-config="key=e2e/azure/${E2E_CLUSTER_NAME}.tfstate"
          terraform -chdir=infra/terraform/azure destroy -auto-approve

  e2e-gcp:
    if: inputs.confirm_cost == 'apply' && (inputs.clouds == 'gcp' || inputs.clouds == 'all')
    timeout-minutes: 90
    runs-on: ubuntu-latest
    # Requires a GitHub Environment named "e2e-gcp" — a repo admin should add
    # required reviewers to it so cloud spend needs human approval per run.
    environment: e2e-gcp
    permissions:
      contents: read
      id-token: write
    env:
      # Defined once here; both the go-test step and the teardown-safety step
      # below read these same values, so teardown targets the exact cluster
      # the test created.
      GOOGLE_PROJECT: ${{ vars.GCP_E2E_PROJECT }}
      E2E_GCP_REGION: us-central1
      E2E_GCP_ZONE: us-central1-a
      E2E_CLUSTER_NAME: keda-gpu-e2e-${{ github.run_id }}
      E2E_K8S_VERSION: '1.33'
      E2E_SCALER_IMAGE_REPOSITORY: ghcr.io/pmady/keda-gpu-scaler
      E2E_SCALER_IMAGE_TAG: v0.5.0
      E2E_HELM_TIMEOUT: '1800'
      # Remote state backend created by infra/terraform/gcp/bootstrap.
      E2E_GCP_STATE_BUCKET: ${{ vars.GCP_E2E_STATE_BUCKET }}
      # Where the Go test writes failure diagnostics; uploaded as an artifact below.
      E2E_ARTIFACTS_DIR: ${{ github.workspace }}/e2e-artifacts
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.25'

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.6

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_E2E_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_E2E_SERVICE_ACCOUNT }}

      - name: Run GCP terratest e2e suite
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          mkdir -p "$E2E_ARTIFACTS_DIR"
          set -o pipefail
          go test -tags e2e_gcp -timeout 60m -v ./tests/terratest/ 2>&1 | tee "$E2E_ARTIFACTS_DIR/gotest-gcp.log"

      - name: Upload e2e diagnostics (GCP)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: e2e-diagnostics-gcp-${{ github.run_id }}
          path: e2e-artifacts/
          if-no-files-found: ignore
          retention-days: 14

      # Best-effort teardown safety net: the test's own `defer` is the PRIMARY
      # teardown path. This step only guards against the Go test panicking or
      # being killed before that defer runs. It needs the exact same variable
      # values as the apply (from the job-level env above) or it can't
      # correctly target/destroy the right resources.
      - name: Terraform destroy safety net (GCP)
        if: always()
        continue-on-error: true
        env:
          TF_VAR_project_id: ${{ env.GOOGLE_PROJECT }}
          TF_VAR_region: ${{ env.E2E_GCP_REGION }}
          TF_VAR_zone: ${{ env.E2E_GCP_ZONE }}
          TF_VAR_cluster_name: ${{ env.E2E_CLUSTER_NAME }}
          TF_VAR_kubernetes_version: ${{ env.E2E_K8S_VERSION }}
          TF_VAR_labels: '{}'
          TF_VAR_scaler_image_repository: ${{ env.E2E_SCALER_IMAGE_REPOSITORY }}
          TF_VAR_helm_timeout: ${{ env.E2E_HELM_TIMEOUT }}
        # Re-init the remote backend to the same state prefix the test used, then destroy.
        run: |
          terraform -chdir=infra/terraform/gcp init -reconfigure -input=false \
            -backend-config="bucket=${E2E_GCP_STATE_BUCKET}" \
            -backend-config="prefix=e2e/gcp/${E2E_CLUSTER_NAME}"
          terraform -chdir=infra/terraform/gcp destroy -auto-approve
