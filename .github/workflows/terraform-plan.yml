          fi

      - name: Upload diagnostic logs (azure)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: terraform-diag-azure-${{ github.run_id }}-${{ github.run_attempt }}
