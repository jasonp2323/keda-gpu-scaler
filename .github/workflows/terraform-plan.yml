            echo 'gpu_machine_type        = "n1-standard-4"'
            echo 'gpu_type                = "nvidia-tesla-t4"'
            echo 'gpu_per_node            = 1'
            echo 'gpu_node_count          = 1'
            echo 'scaler_image_repository = "ghcr.io/pmady/keda-gpu-scaler"'
            echo 'helm_timeout            = 1800'
            echo 'labels                  = {}'
