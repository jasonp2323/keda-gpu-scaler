        with:
          terraform_version: 1.15.6

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_E2E_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_E2E_SERVICE_ACCOUNT }}

      - name: terraform init
        env:
          TF_LOG: DEBUG
          TF_LOG_PATH: ${{ github.workspace }}/tf-diag-gcp-init.log
        # Plan-specific state prefix so advisory plans never touch e2e run state.
        run: |
          terraform -chdir=infra/terraform/gcp init -input=false \
            -backend-config="bucket=${{ vars.GCP_E2E_STATE_BUCKET }}" \
            -backend-config="prefix=plan/gcp/${{ github.run_id }}"

      - name: terraform plan
        id: plan
        env:
          TF_LOG: DEBUG
          TF_LOG_PATH: ${{ github.workspace }}/tf-diag-gcp-plan.log
        run: |
          set +e
          terraform -chdir=infra/terraform/gcp plan -input=false -lock=false -no-color -out=plan.out 2>&1 | tee infra/terraform/gcp/plan.txt
