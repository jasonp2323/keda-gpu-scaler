# Infra Validate
#
# Cheap, per-PR "Tier 1-2" gate for the Terraform stacks under
# infra/terraform/{aws,azure,gcp}. This is the free, fast complement to the
# expensive apply-level suite in e2e-cloud.yaml (which provisions real billed
# GPU hardware and is workflow_dispatch-only).
#
# Two tiers of checks:
#   - fmt / validate / tflint / checkov: credential-less, run against every
#     PR, BLOCKING. They only read provider schemas, lint rules, and static
#     IaC scan rules — no cloud account is ever contacted, so they can't leak
#     secrets or cost money.
#   - plan: OIDC-authed against the real cloud (read-only), ADVISORY only
#     (continue-on-error: true at the job level). It is not a merge blocker
#     because these stacks configure their kubernetes/helm providers from the
#     cluster endpoint that only exists AFTER `apply` — a fresh, stateless
#     `terraform plan` against an empty state can legitimately fail or defer
#     those resources. Reviewers should still read plan output when it
#     succeeds; a failure here just means "inconclusive," not "broken."
name: Infra Validate

on:
  pull_request:
    paths: ['infra/terraform/**', '.github/workflows/infra-validate.yaml']
  push:
    branches: [main]
    paths: ['infra/terraform/**', '.github/workflows/infra-validate.yaml']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fmt:
    name: terraform fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.6

      - name: terraform fmt -check
        run: terraform fmt -check -recursive infra/terraform

  validate:
    name: terraform validate (${{ matrix.cloud }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cloud: [aws, azure, gcp]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.6

      # -backend=false: no cloud credentials needed to init providers/modules.
      - name: terraform init (no backend)
        run: terraform -chdir=infra/terraform/${{ matrix.cloud }} init -backend=false -input=false

      # validate only reads provider schemas locally, no credentials needed.
      - name: terraform validate
        run: terraform -chdir=infra/terraform/${{ matrix.cloud }} validate

  tflint:
    name: tflint (${{ matrix.cloud }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cloud: [aws, azure, gcp]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up tflint
        uses: terraform-linters/setup-tflint@6e1e0642c0289bd619021bf6b34e3c08ed1e005a # v6.3.0

      - name: tflint --init
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: tflint --chdir=infra/terraform/${{ matrix.cloud }} --init

      - name: tflint
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: tflint --chdir=infra/terraform/${{ matrix.cloud }} -f compact

  # Checkov: static Terraform security/misconfiguration scan. Credential-less
  # (reads the Terraform source only, no cloud account contacted) and
  # BLOCKING, same tier as fmt/validate/tflint above. If a finding is
  # acceptable for these throwaway test clusters (e.g. a public API
  # endpoint, no encryption at rest), suppress it via a repo-root
  # .checkov.yaml (skip-check) or an inline
  # `#checkov:skip=<CHECK_ID>:<reason>` comment — don't disable this gate.
  checkov:
    name: checkov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Checkov
        uses: bridgecrewio/checkov-action@7b972723c44fb3d256283fac96fae5d7c1894bb7 # v12.3114.0
        with:
          directory: infra/terraform
          framework: terraform
          output_format: cli
          soft_fail: false

  # ADVISORY (continue-on-error: true): these stacks wire their
  # kubernetes/helm providers to the cluster endpoint created by this same
  # apply, which does not exist yet for a stateless `terraform plan`. That
  # dependency can legitimately make plan fail or defer part of the graph
  # even when the config is fine. Plan here also needs real (read-only) OIDC
  # cloud credentials, another way this step can fail for reasons unrelated
  # to code correctness. So: read the plan output when it succeeds, but a
  # failure must not block the PR — no `environment:` approval gate is used
  # here either, since plan is read-only/cheap (unlike apply in e2e-cloud.yaml).
  plan-aws:
    name: terraform plan (aws, advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      id-token: write
    env:
      # Placeholders for the variables in infra/terraform/aws/variables.tf
      # that have no default, so init/plan never blocks on interactive var
      # input. Values follow infra/terraform/aws/terraform.tfvars.example.
      TF_VAR_region: us-east-2
      TF_VAR_cluster_name: keda-gpu-scaler-ci-plan
      TF_VAR_kubernetes_version: '1.35'
      TF_VAR_tags: '{}'
      TF_VAR_gpu_instance_type: g5.xlarge
      TF_VAR_gpu_node_count: 1
      TF_VAR_scaler_image_repository: ghcr.io/pmady/keda-gpu-scaler
      TF_VAR_helm_timeout: 600
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_E2E_ROLE_ARN }}
          aws-region: ${{ vars.AWS_E2E_REGION }}

      - name: terraform init
        run: terraform -chdir=infra/terraform/aws init -input=false

      - name: terraform plan
        run: terraform -chdir=infra/terraform/aws plan -input=false -lock=false

  plan-azure:
    name: terraform plan (azure, advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.6

      - name: Azure login (OIDC)
        uses: azure/login@93381592711f247e165c389ebb30b596c84cdc48 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_E2E_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_E2E_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_E2E_SUBSCRIPTION_ID }}

      # No TF_VAR_* needed: every variable in
      # infra/terraform/azure/variables.tf has a default. subscription_id
      # defaults to null and is instead resolved from ARM_SUBSCRIPTION_ID.
      - name: terraform init
        env:
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_E2E_SUBSCRIPTION_ID }}
        run: terraform -chdir=infra/terraform/azure init -input=false

      - name: terraform plan
        env:
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_E2E_SUBSCRIPTION_ID }}
        run: terraform -chdir=infra/terraform/azure plan -input=false -lock=false

  plan-gcp:
    name: terraform plan (gcp, advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      id-token: write
    env:
      # Placeholders for the variables in infra/terraform/gcp/variables.tf
      # that have no default, so init/plan never blocks on interactive var
      # input. Values follow infra/terraform/gcp/terraform.tfvars.example.
      TF_VAR_project_id: ${{ vars.GCP_E2E_PROJECT }}
      TF_VAR_region: us-central1
      TF_VAR_zone: us-central1-a
      TF_VAR_cluster_name: keda-gpu-scaler-ci-plan
      TF_VAR_kubernetes_version: '1.33'
      TF_VAR_labels: '{}'
      TF_VAR_scaler_image_repository: ghcr.io/pmady/keda-gpu-scaler
      TF_VAR_helm_timeout: 1800
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.6

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_E2E_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_E2E_SERVICE_ACCOUNT }}

      - name: terraform init
        run: terraform -chdir=infra/terraform/gcp init -input=false

      - name: terraform plan
        run: terraform -chdir=infra/terraform/gcp plan -input=false -lock=false
