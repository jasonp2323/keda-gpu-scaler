# E2E Destroy
#
# Manual "destroy button" for a leaked/leftover e2e GPU cluster. A normal e2e
# run (e2e-cloud.yaml) already self-destroys — the Terratest suite defers
# `terraform destroy` and each job has an always() teardown safety net. This
# workflow is the manual valve for the rare case a cluster survives both (killed
# runner, backend hiccup), since the scheduled janitor was removed.
#
# It re-inits the remote backend to the run's state key (e2e/<cloud>/<cluster>)
# and runs `terraform destroy`, so you must supply the exact cluster name — find
# it from the `Project=keda-gpu-scaler` tag/label in the cloud console or from
# the state bucket.
#
# Gating (Option A): workflow_dispatch is triggerable only by users with write
# access, and you must type `destroy` to confirm. The `environment:` block is
# what supplies the OIDC subject the bootstrap trust policy expects; on a public
# repo or GitHub Enterprise it additionally enforces required-reviewer approval.
name: E2E Destroy

on:
  workflow_dispatch:
    inputs:
      cloud:
        description: 'Cloud to destroy in'
        type: choice
        options:
          - aws
          - azure
          - gcp
        required: true
      cluster_name:
        description: 'Exact cluster name to destroy (its state key is e2e/<cloud>/<cluster_name>)'
        type: string
        required: true
      confirm:
        description: "Type 'destroy' to confirm you are tearing down real infrastructure"
        type: string
        required: true

concurrency:
  # Never destroy the same cluster from two runs at once.
  group: destroy-${{ inputs.cloud }}-${{ inputs.cluster_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  destroy-aws:
    if: inputs.confirm == 'destroy' && inputs.cloud == 'aws'
    timeout-minutes: 60
    runs-on: ubuntu-latest
    environment: e2e-aws
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_E2E_REGION }}
      E2E_AWS_STATE_BUCKET: ${{ vars.AWS_E2E_STATE_BUCKET }}
      E2E_AWS_STATE_LOCK_TABLE: ${{ vars.AWS_E2E_STATE_LOCK_TABLE }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_E2E_ROLE_ARN }}
          aws-region: ${{ vars.AWS_E2E_REGION }}

      - name: Terraform destroy (AWS)
        env:
          TF_VAR_region: ${{ vars.AWS_E2E_REGION }}
          TF_VAR_cluster_name: ${{ inputs.cluster_name }}
          TF_VAR_tags: '{}'
          TF_VAR_gpu_instance_type: g5.xlarge
          TF_VAR_gpu_node_count: 1
          TF_VAR_scaler_image_repository: ghcr.io/pmady/keda-gpu-scaler
          TF_VAR_helm_timeout: 600
        run: |
          terraform -chdir=infra/terraform/aws init -reconfigure -input=false \
            -backend-config="bucket=${E2E_AWS_STATE_BUCKET}" \
            -backend-config="key=e2e/aws/${{ inputs.cluster_name }}.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${E2E_AWS_STATE_LOCK_TABLE}" \
            -backend-config="encrypt=true"
          terraform -chdir=infra/terraform/aws destroy -auto-approve

  destroy-azure:
    if: inputs.confirm == 'destroy' && inputs.cloud == 'azure'
    timeout-minutes: 60
    runs-on: ubuntu-latest
    environment: e2e-azure
    permissions:
      contents: read
      id-token: write
    env:
      E2E_AZURE_STATE_RESOURCE_GROUP: ${{ vars.AZURE_E2E_STATE_RESOURCE_GROUP }}
      E2E_AZURE_STATE_STORAGE_ACCOUNT: ${{ vars.AZURE_E2E_STATE_STORAGE_ACCOUNT }}
      E2E_AZURE_STATE_CONTAINER: ${{ vars.AZURE_E2E_STATE_CONTAINER }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.6

      - name: Azure login (OIDC)
        uses: azure/login@93381592711f247e165c389ebb30b596c84cdc48 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_E2E_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_E2E_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_E2E_SUBSCRIPTION_ID }}

      - name: Terraform destroy (Azure)
        env:
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_E2E_SUBSCRIPTION_ID }}
          TF_VAR_cluster_name: ${{ inputs.cluster_name }}
          TF_VAR_location: eastus
          TF_VAR_resource_group_name: ${{ inputs.cluster_name }}-rg
        run: |
          terraform -chdir=infra/terraform/azure init -reconfigure -input=false \
            -backend-config="resource_group_name=${E2E_AZURE_STATE_RESOURCE_GROUP}" \
            -backend-config="storage_account_name=${E2E_AZURE_STATE_STORAGE_ACCOUNT}" \
            -backend-config="container_name=${E2E_AZURE_STATE_CONTAINER:-tfstate}" \
            -backend-config="key=e2e/azure/${{ inputs.cluster_name }}.tfstate"
          terraform -chdir=infra/terraform/azure destroy -auto-approve

  destroy-gcp:
    if: inputs.confirm == 'destroy' && inputs.cloud == 'gcp'
    timeout-minutes: 60
    runs-on: ubuntu-latest
    environment: e2e-gcp
    permissions:
      contents: read
      id-token: write
    env:
      E2E_GCP_STATE_BUCKET: ${{ vars.GCP_E2E_STATE_BUCKET }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.6

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_E2E_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_E2E_SERVICE_ACCOUNT }}

      - name: Terraform destroy (GCP)
        env:
          TF_VAR_project_id: ${{ vars.GCP_E2E_PROJECT }}
          TF_VAR_region: us-central1
          TF_VAR_zone: us-central1-a
          TF_VAR_cluster_name: ${{ inputs.cluster_name }}
          TF_VAR_gpu_machine_type: n1-standard-4
          TF_VAR_gpu_type: nvidia-tesla-t4
          TF_VAR_gpu_per_node: 1
          TF_VAR_gpu_node_count: 1
          TF_VAR_helm_timeout: 1800
          TF_VAR_scaler_image_repository: ghcr.io/pmady/keda-gpu-scaler
          TF_VAR_labels: '{}'
        run: |
          terraform -chdir=infra/terraform/gcp init -reconfigure -input=false \
            -backend-config="bucket=${E2E_GCP_STATE_BUCKET}" \
            -backend-config="prefix=e2e/gcp/${{ inputs.cluster_name }}"
          terraform -chdir=infra/terraform/gcp destroy -auto-approve
