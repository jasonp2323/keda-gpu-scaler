# Infra Validate
#
# Cheap, per-PR "Tier 1-2" gate for the Terraform stacks under
# infra/terraform/{aws,azure,gcp}. This is the free, fast complement to the
# expensive apply-level suite in e2e-cloud.yaml (which provisions real billed
# GPU hardware and is workflow_dispatch-only).
#
# Two tiers of checks:
#   - fmt / validate / tflint / checkov: credential-less, run against every
#     PR, BLOCKING. They only read provider schemas, lint rules, and static
#     IaC scan rules — no cloud account is ever contacted, so they can't leak
#     secrets or cost money.
#   - plan: OIDC-authed against the real cloud (read-only), ADVISORY only
#     (continue-on-error: true at the job level). It is not a merge blocker
#     because these stacks configure their kubernetes/helm providers from the
#     cluster endpoint that only exists AFTER `apply` — a fresh, stateless
#     `terraform plan` against an empty state can legitimately fail or defer
#     those resources. Reviewers should still read plan output when it
#     succeeds; a failure here just means "inconclusive," not "broken." Each
#     plan job also uploads a plan artifact/diagnostics, posts a digest and
#     change table to the job summary, and updates a single PR comment (per
#     cloud) in place across pushes.
#   - cost: PR-only, credential-less (Infracost parses HCL statically) advisory
#     matrix over the three clouds. Posts/refreshes one cost comment per cloud
#     and a job-summary breakdown.
#   - docs: PR-only, single job (not matrixed, to avoid racing pushes) that
#     regenerates each stack's terraform-docs block in place and pushes the
#     change back to the PR branch if anything changed.
name: Infra Validate

on:
  pull_request:
    paths: ['infra/terraform/**', '.github/workflows/infra-validate.yaml']
  push:
    branches: [main]
    paths: ['infra/terraform/**', '.github/workflows/infra-validate.yaml']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fmt:
    name: terraform fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.6

      - name: terraform fmt -check
        run: terraform fmt -check -recursive infra/terraform

  validate:
    name: terraform validate (${{ matrix.cloud }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cloud: [aws, azure, gcp, aws/bootstrap, azure/bootstrap, gcp/bootstrap]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.6

      # -backend=false: no cloud credentials needed to init providers/modules.
      - name: terraform init (no backend)
        run: terraform -chdir=infra/terraform/${{ matrix.cloud }} init -backend=false -input=false

      # validate only reads provider schemas locally, no credentials needed.
      - name: terraform validate
        run: terraform -chdir=infra/terraform/${{ matrix.cloud }} validate

  tflint:
    name: tflint (${{ matrix.cloud }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cloud: [aws, azure, gcp, aws/bootstrap, azure/bootstrap, gcp/bootstrap]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up tflint
        uses: terraform-linters/setup-tflint@6e1e0642c0289bd619021bf6b34e3c08ed1e005a # v6.3.0

      - name: tflint --init
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: tflint --chdir=infra/terraform/${{ matrix.cloud }} --init

      - name: tflint
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: tflint --chdir=infra/terraform/${{ matrix.cloud }} -f compact

  # Checkov: static Terraform security/misconfiguration scan. Credential-less
  # (reads the Terraform source only, no cloud account contacted) and
  # BLOCKING, same tier as fmt/validate/tflint above. If a finding is
  # acceptable for these throwaway test clusters (e.g. a public API
  # endpoint, no encryption at rest), suppress it via a repo-root
  # .checkov.yaml (skip-check) or an inline
  # `#checkov:skip=<CHECK_ID>:<reason>` comment — don't disable this gate.
  checkov:
    name: checkov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Checkov
        uses: bridgecrewio/checkov-action@7b972723c44fb3d256283fac96fae5d7c1894bb7 # v12.3114.0
        with:
          directory: infra/terraform
          framework: terraform
          output_format: cli
          soft_fail: false

  # ADVISORY (continue-on-error: true): these stacks wire their
  # kubernetes/helm providers to the cluster endpoint created by this same
  # apply, which does not exist yet for a stateless `terraform plan`. That
  # dependency can legitimately make plan fail or defer part of the graph
  # even when the config is fine. Plan here also needs real (read-only) OIDC
  # cloud credentials, another way this step can fail for reasons unrelated
  # to code correctness. So: read the plan output when it succeeds, but a
  # failure must not block the PR — no `environment:` approval gate is used
  # here either, since plan is read-only/cheap (unlike apply in e2e-cloud.yaml).
  #
  # Every plan run also (regardless of plan success/failure, via `if: always()`):
  #   1. Uploads the binary plan (plan.out) as an artifact.
  #   2. Runs tf-summarize over the plan and appends a digest to the job summary.
  #   3. Uploads TF_LOG debug logs + the human-readable plan text as artifacts.
  #   4. Appends a plan/change-table job summary.
  #   5. Creates/updates (in place) a single PR comment per cloud with the plan.
  plan-aws:
    name: terraform plan (aws, advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    env:
      # Placeholders for the variables in infra/terraform/aws/variables.tf
      # that have no default, so init/plan never blocks on interactive var
      # input. Values follow infra/terraform/aws/terraform.tfvars.example.
      TF_VAR_region: us-east-2
      TF_VAR_cluster_name: keda-gpu-scaler-ci-plan
      TF_VAR_kubernetes_version: '1.33'
      TF_VAR_tags: '{}'
      TF_VAR_gpu_instance_type: g5.xlarge
      TF_VAR_gpu_node_count: 1
      TF_VAR_scaler_image_repository: ghcr.io/pmady/keda-gpu-scaler
      TF_VAR_helm_timeout: 600
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_E2E_ROLE_ARN }}
          aws-region: ${{ vars.AWS_E2E_REGION }}

      - name: terraform init
        env:
          TF_LOG: DEBUG
          TF_LOG_PATH: ${{ github.workspace }}/tf-diag-aws-init.log
        # Partial backend now requires config at init. Use a plan-specific state
        # key so advisory plans never touch the e2e run state.
        run: |
          terraform -chdir=infra/terraform/aws init -input=false \
            -backend-config="bucket=${{ vars.AWS_E2E_STATE_BUCKET }}" \
            -backend-config="key=plan/aws/${{ github.run_id }}.tfstate" \
            -backend-config="region=${{ vars.AWS_E2E_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.AWS_E2E_STATE_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: terraform plan
        id: plan
        env:
          TF_LOG: DEBUG
          TF_LOG_PATH: ${{ github.workspace }}/tf-diag-aws-plan.log
        run: |
          set +e
          terraform -chdir=infra/terraform/aws plan -input=false -lock=false -no-color -out=plan.out 2>&1 | tee infra/terraform/aws/plan.txt
          code=${PIPESTATUS[0]}
          echo "plan exit: ${code}"
          exit 0   # advisory job — never fail here

      - name: Upload plan artifact (aws)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: tfplan-aws-${{ github.sha }}
          path: infra/terraform/aws/plan.out
          retention-days: 5
          if-no-files-found: ignore

      - name: Plan digest (aws, tf-summarize)
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          [ -f infra/terraform/aws/plan.out ] || { echo "no plan.out; skipping"; exit 0; }
          ver=$(curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" https://api.github.com/repos/dineshba/terraform-plan-summary/releases/latest | jq -r .tag_name)
          [ -n "$ver" ] && [ "$ver" != "null" ] || { echo "no release; skipping"; exit 0; }
          curl -fsSL "https://github.com/dineshba/terraform-plan-summary/releases/download/${ver}/tf-summarize_linux_amd64.tar.gz" | tar -xz tf-summarize
          { echo "### Plan digest — aws (tf-summarize)"; echo '```'; (cd infra/terraform/aws && "$GITHUB_WORKSPACE/tf-summarize" plan.out); echo '```'; } >> "$GITHUB_STEP_SUMMARY"

      - name: Plan change table (aws)
        if: always()
        run: |
          if [ -f infra/terraform/aws/plan.out ]; then
            {
              echo "| Change | Resource |"
              echo "| --- | --- |"
              terraform -chdir=infra/terraform/aws show -json plan.out \
                | jq -r '
                    .resource_changes[]
                    | select((.change.actions | index("no-op") | not) and (.change.actions | index("read") | not))
                    | ( .change.actions | join(",") ) as $a
                    | ( if $a == "create" then "create"
                        elif $a == "update" then "update"
                        elif $a == "delete" then "destroy"
                        elif $a == "delete,create" or $a == "create,delete" then "replace"
                        else $a end ) as $label
                    | "| \($label) | `\(.address)` |"
                  '
            } > infra/terraform/aws/plan-table.md
          else
            echo "no plan.out; skipping plan table"
          fi

      - name: Upload diagnostic logs (aws)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: terraform-diag-aws-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            tf-diag-aws-*.log
            infra/terraform/aws/plan.txt
          retention-days: 30
          if-no-files-found: ignore

      - name: Job summary (aws)
        if: always()
        run: |
          {
            echo "## Terraform plan — aws"
            echo
            if [ -f infra/terraform/aws/plan-table.md ]; then
              cat infra/terraform/aws/plan-table.md
              echo
            fi
            if [ -f infra/terraform/aws/plan.txt ]; then
              line=$(grep -E '^(Plan:|No changes)' infra/terraform/aws/plan.txt | head -1)
              if [ -n "$line" ]; then
                echo "**${line}**"
                echo
                echo "<details><summary>Full plan output</summary>"
                echo
                echo '```hcl'
                head -c 900000 infra/terraform/aws/plan.txt
                echo '```'
                echo
                echo "</details>"
              else
                echo "### Error"
                echo
                echo '```'
                grep -E '^(Error:|│)' infra/terraform/aws/plan.txt || echo "no error detail found"
                echo '```'
              fi
            else
              echo "_no plan output (plan.txt missing)_"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment plan on PR (aws)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const fs = require('fs');
            const cloud = 'aws';
            const marker = `<!-- tf-plan-${cloud} -->`;
            const planPath = `infra/terraform/${cloud}/plan.txt`;
            const tablePath = `infra/terraform/${cloud}/plan-table.md`;

            let body;
            if (!fs.existsSync(planPath)) {
              body = `${marker}\n### Terraform plan — ${cloud}\n\n_plan unavailable (see workflow run for details)_`;
            } else {
              const planText = fs.readFileSync(planPath, 'utf8');
              const match = planText.match(/^(Plan:.*|No changes.*)$/m);
              const planLine = match ? match[0] : null;
              const table = fs.existsSync(tablePath) ? fs.readFileSync(tablePath, 'utf8') : '';
              const truncated = planText.length > 60000 ? planText.slice(0, 60000) + '\n... (truncated)' : planText;

              const sections = [
                marker,
                `### Terraform plan — ${cloud}`,
                '',
                planLine ? `**${planLine}**` : '_plan failed — see workflow run for error details_',
              ];
              if (table) {
                sections.push('', '<details><summary>Change summary</summary>', '', table, '</details>');
              }
              sections.push(
                '',
                '<details><summary>Full plan output</summary>',
                '',
                '```hcl',
                truncated,
                '```',
                '',
                '</details>',
              );
              body = sections.join('\n');
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  plan-azure:
    name: terraform plan (azure, advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
